<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IC P&D - Login</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <main class="login-container">
        <section class="login-box">
            <header>
                <h1 class="logo">SGCI<span></span></h1>
                <p>HUB para o laboratório LEQM</p>
            </header>

            <form id="loginForm">
                <div class="input-group">
                    <label for="username">E-mail</label>
                    <input type="email" id="username" required placeholder="pesquisador@gmail.com">
                </div>

                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>

                <button type="submit" id="btnLogin">Entrar no Sistema</button>
                <div id="message" class="error-msg"></div>
            </form>

            <footer>
                <p>Ainda não tem acesso? <a href="registro.html">Solicitar Registro</a></p>
            </footer>
        </section>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
