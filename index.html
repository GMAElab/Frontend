<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SGCI LEQM</title>
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
</head>
<body class="bg-light">
    <main class="login-container">
        
        <section class="card login-card">
            <header class="text-center mb-md">
                <h1 class="text-primary">SGCI Hub</h1>
                <p class="text-muted">Laboratório de P&D (LEQM)</p>
            </header>

            <form id="login-form" aria-label="Formulário de Autenticação">
                <div class="input-group">
                    <label for="email">E-mail corporativo</label>
                    <input type="email" id="email" name="email" required autocomplete="username" placeholder="pesquisador@leqm.com">
                </div>

                <div class="input-group">
                    <label for="password">Senha de acesso</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••">
                </div>

                <div id="login-feedback" class="feedback-msg" aria-live="polite"></div>

                <button type="submit" id="btn-login" class="btn btn-primary btn-block">
                    <span class="btn-text">Entrar no Sistema</span>
                    <span class="spinner hidden" aria-hidden="true"></span>
                </button>
            </form>

            <footer class="login-footer mt-md text-center">
                <p class="text-small text-muted">Ainda não possui acesso? <a href="registro.html" id="link-register">Solicitar conta</a></p>
            </footer>
        </section>

    </main>

    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
