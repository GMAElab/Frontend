<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel de Controle | LEQM Hub</title>
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body class="dashboard-layout">
    
    <aside class="sidebar">
        <div class="sidebar-brand">
            <h2>LEQM Hub</h2>
        </div>
        
        <nav class="sidebar-nav">
            <ul>
                <li><button class="nav-item active" data-view="inicio">Início</button></li>
                <li><button class="nav-item" data-view="equipments">Equipamentos</button></li>
                <li><button class="nav-item" data-view="processes">Processos P&D</button></li>
                <li><button class="nav-item" data-view="pops">POPs</button></li>
                <li><button class="nav-item" data-view="pta">PTA </button></li>
                <li><button class="nav-item" data-view="articles">Artigos</button></li>
                <li><button class="nav-item" data-view="admin">Admin</button></li>
                
                
                
            </ul>
        </nav>
        
        <div class="sidebar-footer">
            <button id="btn-logout" class="btn btn-outline-danger btn-block">Sair do Sistema</button>
        </div>
    </aside>

    <div class="main-wrapper">
        <header class="topbar">
            <div class="topbar-left">
                <button class="menu-toggle" id="menu-toggle">☰</button>
                <h2 id="current-page-title">Dashboard</h2>
            </div>
            <div class="topbar-right">
                <span id="user-greeting" style="margin-right: 15px; font-weight: 500;">(preciso mexer ainda)</span>
                <div class="avatar" id="user-avatar">P</div>
            </div>
        </header>

        <main id="dynamic-content" class="content-area">
            <section class="card welcome-card">
                <h3>Bem-vindo ao sistema de gerenciamento do laboratório LEQM</h3>
                <p>Selecione algum módulo à esquerda para começar.</p>
            </section>
        </main>
    </div>

    <div id="modal-eq" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999999; justify-content: center; align-items: center;">
        <div class="modal-content" style="max-width: 600px; width: 90%; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.6);">
            
            <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px;">
                <h3 style="margin: 0;">+ Novo Equipamento</h3>
                <button type="button" onclick="window.closeEquipModal()" style="background:none; border:none; font-size:30px; cursor:pointer; color:#999;">&times;</button>
            </div>
            
            <form id="form-new-eq" onsubmit="window.handleSaveEquipment(event)">
                <div class="input-group" style="margin-bottom: 15px;">
                    <label for="eq-name" style="display:block; font-weight:bold; margin-bottom:5px;">Nome do Equipamento: *</label>
                    <input type="text" id="eq-name" required placeholder="Ex: Microscópio Óptico" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">
                </div>

                <div class="input-group" style="margin-bottom: 15px;">
                    <label for="eq-desc" style="display:block; font-weight:bold; margin-bottom:5px;">Descrição básica:</label>
                    <textarea id="eq-desc" rows="3" placeholder="Detalhes e especificações..." style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;"></textarea>
                </div>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                    <div class="input-group">
                        <label for="eq-video" style="display:block; font-weight:bold; margin-bottom:5px;">Vídeo (YouTube URL):</label>
                        <input type="url" id="eq-video" placeholder="https://..." style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">
                    </div>
                    <div class="input-group">
                        <label for="eq-manual" style="display:block; font-weight:bold; margin-bottom:5px;">POP:</label>
                        <input type="url" id="eq-manual" placeholder="https://..." style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">
                    </div>
                </div>

                <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px; border-top: 1px solid #eee; padding-top: 15px;">
                    <button type="button" onclick="window.closeEquipModal()" style="padding:10px 20px; background:#eee; border:none; border-radius:4px; cursor:pointer;">Cancelar</button>
                    <button type="submit" id="btn-save-eq" class="btn btn-primary" style="padding:10px 20px; background:var(--primary); color:white; border:none; border-radius:4px; cursor:pointer; font-weight:bold;">Salvar Equipamento</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modal-dossier" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999999; justify-content: center; align-items: center;">
        <div class="modal-content" style="max-width: 850px; width: 90%; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.6);">
            <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px;">
                <h3 id="dossier-title" style="margin:0;">Carregando...</h3>
                <button type="button" onclick="window.closeDossierModal()" style="background:none; border:none; font-size:30px; cursor:pointer; color:#999;">&times;</button>
            </div>
            <div id="dossier-body" style="display:grid; grid-template-columns: 1.5fr 1fr; gap:25px;">
                </div>
        </div>
    </div>

    <div id="deep-view-modal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.65); z-index: 999999; justify-content: center; align-items: center; padding: 20px; overflow-y: auto;">
        <div class="modal-content" style="max-width: 720px; width: 100%; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.3);">
            <div class="modal-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom:1px solid #eee; padding-bottom:10px;">
                <h3 id="dv-title" style="margin:0;">Editar Registro</h3>
                <button type="button" onclick="window.closeDeepView()" style="background:none; border:none; font-size:28px; cursor:pointer; color:#999;">&times;</button>
            </div>
            <div id="dv-body" style="display:flex; flex-direction:column; gap:16px;"></div>
            <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
                <button class="btn btn-secondary" onclick="window.closeDeepView()" style="padding:10px 18px;">Cancelar</button>
                <button class="btn btn-primary" id="dv-save-btn" style="padding:10px 18px;">💾 Salvar Alterações</button>
            </div>
        </div>
    </div>

    <div id="processModal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999999; justify-content: center; align-items: center;">
        <div class="modal-content" style="max-width: 850px; width: 95%; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); max-height: 90vh; overflow-y: auto;">
            
            <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px;">
                <h2 style="margin: 0; color: #333;">Mapeamento de Processo P&D</h2>
                <button type="button" onclick="window.closeProcessModal()" style="background:none; border:none; font-size:30px; cursor:pointer; color:#999;">&times;</button>
            </div>
            
            <div class="tabs-nav" style="display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #ddd; padding-bottom: 10px;">
                <button type="button" class="tab-btn active" onclick="window.openTab(event, 'tab-planejamento')" style="padding:10px; cursor:pointer; border:none; background:none; font-weight:bold;">1. Planejamento</button>
                <button type="button" class="tab-btn" onclick="window.openTab(event, 'tab-execucao')" style="padding:10px; cursor:pointer; border:none; background:none;">2. Execução</button>
                <button type="button" class="tab-btn" onclick="window.openTab(event, 'tab-resultados')" style="padding:10px; cursor:pointer; border:none; background:none;">3. Resultados & Anexos</button>
            </div>

            <form id="processForm" onsubmit="window.handleSaveProcess(event)">
                <div id="tab-planejamento" class="tab-content" style="display: block;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="input-group">
                            <label for="proc-nome">Nome do Processo: *</label>
                            <input type="text" id="proc-nome" required style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;">
                        </div>
                        <div class="input-group">
                            <label for="proc-resp">Responsável:</label>
                            <input type="text" id="proc-resp" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;">
                        </div>
                        <div style="grid-column: span 2;">
                            <label for="proc-objetivo">Objetivo da Fase:</label>
                            <input type="text" id="proc-objetivo" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;">
                        </div>
                        <div style="grid-column: span 2;">
                            <label for="proc-visao">Visão Geral:</label>
                            <textarea id="proc-visao" rows="3" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;"></textarea>
                        </div>
                    </div>
                </div>

                <div id="tab-execucao" class="tab-content" style="display: none;">
                    <div style="display: grid; gap: 15px;">
                        <div>
                            <label for="proc-equipe">Equipe Envolvida:</label>
                            <input type="text" id="proc-equipe" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;">
                        </div>
                        <div>       
                            <label for="proc-etapas">Detalhamento das Etapas:</label>
                            <textarea id="proc-etapas" rows="5" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;" placeholder="Passo 1, Passo 2..."></textarea>
                        </div>
                    </div>
                </div>

                <div id="tab-resultados" class="tab-content" style="display: none;">
                    <div style="display: grid; gap: 15px;">
                        <div>
                            <label for="proc-indicadores">Indicadores e Resultados:</label>
                            <textarea id="proc-indicadores" rows="3" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;"></textarea>
                        </div>
                        <div>
                            <label for="proc-anexos">Anexos:</label>
                            <input type="url" id="proc-anexos" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;">
                        </div>
                        <div>
                            <label for="proc-status">Status Final:</label>
                            <select id="proc-status" style="width:100%; padding:8px; border-radius:4px; border:1px solid #ccc;">
                                <option value="rascunho">RASCUNHO</option>
                                <option value="em_andamento">EM ANDAMENTO</option>
                                <option value="concluido">CONCLUÍDO</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:25px; border-top: 1px solid #eee; padding-top: 20px;">
                    <button type="button" onclick="window.closeProcessModal()" style="padding:10px 20px; background:#eee; border:none; border-radius:4px; cursor:pointer;">Cancelar</button>
                    <button type="submit" class="btn btn-primary" style="padding:10px 20px; background:var(--primary); color:white; border:none; border-radius:4px; cursor:pointer; font-weight:bold;">Salvar Processo</button>
                </div>
            </form>
        </div>
    </div>

    <div id="popModal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999999; justify-content: center; align-items: center;">
        <div class="modal-content" style="max-width: 850px; width: 95%; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); max-height: 90vh; overflow-y: auto;">
            
            <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px;">
                <h2 style="margin: 0; color: #333;">📄 POP</h2>
                <button type="button" onclick="window.closePopModal()" style="background:none; border:none; font-size:30px; cursor:pointer; color:#999;">&times;</button>
            </div>
            
            <form id="popForm"></form>
            
        </div>
    </div>

    <div id="toast-container" style="position: fixed; top: 20px; right: 20px; z-index: 1000000;"></div>

    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/views/equipments.js"></script>
    <script src="js/views/processes.js"></script> 
    <script src="js/dashboard.js"></script>
    <script src="js/views/pta.js?v=2"></script>
    <script src="js/views/pops.js?v=183"></script>
    <script src="js/views/admin.js?v=500"></script>
    <script src="js/views/articles.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</body>
</html>
