<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | SGCI LEQM</title>
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body class="dashboard-layout">
    
    <aside class="sidebar" aria-label="Menu Principal">
        <div class="sidebar-brand">
            <h2>LEQM</h2>
        </div>
        
        <nav class="sidebar-nav">
            <ul>
                <li><button class="nav-item active" data-view="inicio">Início</button></li>
                <li><button class="nav-item" data-view="equipments">Equipamentos</button></li>
                <li><button class="nav-item" data-view="processes">Processos P&D</button></li>
                <li><button class="nav-item" data-view="pops">POPs</button></li>
            </ul>
        </nav>
        
        <div class="sidebar-footer">
            <button id="btn-logout" class="btn btn-outline-danger btn-block">Sair do Sistema</button>
        </div>
    </aside>

    <div class="main-wrapper">
        <header class="topbar">
            <div class="topbar-left">
                <button id="btn-menu-toggle" class="btn-icon d-mobile-only" aria-label="Alternar Menu">☰</button>
                <h2 id="current-page-title">Dashboard Inicial</h2>
            </div>
            <div class="topbar-right">
                <span id="user-greeting" class="text-small text-muted">Olá, Pesquisador</span>
                <div class="avatar" aria-label="Perfil do usuário">P</div>
            </div>
        </header>

        <main id="dynamic-content" class="content-area" aria-live="polite">
            <section class="card welcome-card">
                <h3>Bem-vindo ao Centro de Controle</h3>
                <p>Selecione um módulo no menu lateral esquerdo para gerenciar os dados do laboratório.</p>
            </section>
        </main>
    </div>

    <div id="toast-container" class="toast-container" aria-live="assertive"></div>

    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    
    <script src="js/views/equipments.js"></script>
    <script src="js/views/processes.js"></script>
    <script src="js/views/pops.js"></script>
</body>
</html>
