<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle | LEQM Hub</title>
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body class="dashboard-layout">
    
    <aside class="sidebar">
        <div class="sidebar-brand">
            <h2>LEQM Hub</h2>
        </div>
        
        <nav class="sidebar-nav">
            <ul>
                <li><button class="nav-item active" data-view="inicio">Início</button></li>
                <li><button class="nav-item" data-view="equipments">Equipamentos</button></li>
                <li><button class="nav-item" data-view="processes">Processos P&D</button></li>
                <li><button class="nav-item" data-view="pops">POPs</button></li>
            </ul>
        </nav>
        
        <div class="sidebar-footer">
            <button id="btn-logout" class="btn btn-outline-danger btn-block">Sair do Sistema (em)</button>
        </div>
    </aside>

    <div class="main-wrapper">
        <header class="topbar">
            <div class="topbar-left">
                <h2 id="current-page-title">Dashboard Inicial</h2>
            </div>
            <div class="topbar-right">
                <span id="user-greeting" style="margin-right: 15px; font-weight: 500;">Olá, Pesquisador</span>
                <div class="avatar" id="user-avatar">P</div>
            </div>
        </header>

        <main id="dynamic-content" class="content-area">
            <section class="card welcome-card">
                <h3>Bem-vindo ao Ecossistema LEQM</h3>
                <p>Selecione um módulo à esquerda para começar.</p>
            </section>
        </main>
    </div>

<div id="processModal" class="modal-overlay">
    
    <div class="modal-content" style="max-width: 800px; width: 90%; max-height: 90vh; overflow-y: auto; position: relative;">

        <!-- HEADER -->
        <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>Mapeamento de Processo P&D</h2>
            <button type="button" onclick="closeProcessModal()" style="font-size: 28px; background: none; border: none; cursor: pointer;">&times;</button>
        </div>

        <!-- TABS -->
        <div class="tabs-nav" style="display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #eee;">
            <button class="tab-btn active" onclick="openTab(event, 'tab-planejamento')">1. Planejamento</button>
            <button class="tab-btn" onclick="openTab(event, 'tab-execucao')">2. Execução</button>
            <button class="tab-btn" onclick="openTab(event, 'tab-resultados')">3. Resultados</button>
        </div>

        <!-- FORM -->
        <form id="processForm" onsubmit="handleSaveProcess(event)">

            <!-- ========================= -->
            <!-- ABA 1 - PLANEJAMENTO -->
            <!-- ========================= -->
            <div id="tab-planejamento" class="tab-content" style="display: block;">
                <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    
                    <div>
                        <label>Nome do Processo *</label>
                        <input type="text" id="proc_nome" required>
                    </div>

                    <div>
                        <label>Responsável</label>
                        <input type="text" id="proc_responsavel">
                    </div>

                    <div style="grid-column: span 2;">
                        <label>Objetivo da Fase</label>
                        <input type="text" id="proc_objetivo">
                    </div>

                    <div style="grid-column: span 2;">
                        <label>Visão Geral</label>
                        <textarea id="proc_visao"></textarea>
                    </div>
                </div>
            </div>

            <!-- ========================= -->
            <!-- ABA 2 - EXECUÇÃO -->
            <!-- ========================= -->
            <div id="tab-execucao" class="tab-content" style="display: none;">
                <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">

                    <div>
                        <label>Equipe</label>
                        <input type="text" id="proc_equipe">
                    </div>

                    <div>
                        <label>Status</label>
                        <select id="proc_status">
                            <option value="rascunho">Rascunho</option>
                            <option value="em_andamento">Em andamento</option>
                            <option value="concluido">Concluído</option>
                        </select>
                    </div>

                    <div style="grid-column: span 2;">
                        <label>Escopo</label>
                        <textarea id="proc_escopo"></textarea>
                    </div>

                    <div style="grid-column: span 2;">
                        <label>Definição dos Processos</label>
                        <textarea id="proc_definicao"></textarea>
                    </div>
                </div>
            </div>

            <!-- ========================= -->
            <!-- ABA 3 - RESULTADOS -->
            <!-- ========================= -->
            <div id="tab-resultados" class="tab-content" style="display: none;">
                <div class="form-grid" style="display: grid; gap: 15px;">

                    <div>
                        <label>Resultados Obtidos</label>
                        <textarea id="proc_resultados"></textarea>
                    </div>

                    <div>
                        <label>Anexos (link ou descrição)</label>
                        <input type="text" id="proc_anexos">
                    </div>

                </div>
            </div>

            <!-- FOOTER -->
            <div style="margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px;">
                <button type="button" onclick="closeProcessModal()">Cancelar</button>
                <button type="submit">Salvar Processo</button>
            </div>

        </form>
    </div>
</div>

            <!-- ========================= -->
            <!-- ABA 2 - EXECUÇÃO -->
            <!-- ========================= -->
            <div id="tab-execucao" class="tab-content" style="display: none;">
                <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">

                    <div>
                        <label>Equipe</label>
                        <input type="text" id="proc_equipe">
                    </div>

                    <div>
                        <label>Status</label>
                        <select id="proc_status">
                            <option value="rascunho">Rascunho</option>
                            <option value="em_andamento">Em andamento</option>
                            <option value="concluido">Concluído</option>
                        </select>
                    </div>

                    <div style="grid-column: span 2;">
                        <label>Escopo</label>
                        <textarea id="proc_escopo"></textarea>
                    </div>

                    <div style="grid-column: span 2;">
                        <label>Definição dos Processos</label>
                        <textarea id="proc_definicao"></textarea>
                    </div>
                </div>
            </div>

            <!-- ========================= -->
            <!-- ABA 3 - RESULTADOS -->
            <!-- ========================= -->
            <div id="tab-resultados" class="tab-content" style="display: none;">
                <div class="form-grid" style="display: grid; gap: 15px;">

                    <div>
                        <label>Resultados Obtidos</label>
                        <textarea id="proc_resultados"></textarea>
                    </div>

                    <div>
                        <label>Anexos (link ou descrição)</label>
                        <input type="text" id="proc_anexos">
                    </div>

                </div>
            </div>

            <div style="margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px;">
                <button type="button" onclick="closeProcessModal()">Cancelar</button>
                <button type="submit">Salvar Processo</button>
            </div>

        </form>
    </div>
</div>

    <div id="toast-container" style="position: fixed; top: 20px; right: 20px; z-index: 1000000;"></div>

    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/views/equipments.js"></script>
    <script src="js/views/processes.js"></script> 
    <script src="js/dashboard.js"></script>
</body>
</html>
